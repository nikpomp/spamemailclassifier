{% extends "base.html" %}
{% block content %}
<section class="card auth">
  <h2>Login</h2>
  <form method="post">
    <label>Username</label>
    <input type="text" name="username" required>
    <label>Password</label>
    <input type="password" name="password" required>
    <button class="btn" type="submit">Login</button>
  </form>
</section>
{% endblock %}
